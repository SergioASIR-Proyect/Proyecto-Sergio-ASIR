<VirtualHost *:443>
    DocumentRoot /var/www/html
    DirectoryIndex acceso.php

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/seguridad.crt
    SSLCertificateKeyFile /etc/ssl/private/seguridad.key

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
